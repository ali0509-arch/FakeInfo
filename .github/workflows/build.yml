name: Build

on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FakeInfo.sln

      - name: Build
        run: dotnet build FakeInfo.sln --no-restore

      - name: Test
        run: dotnet test FakeInfo.sln --no-build
        # test